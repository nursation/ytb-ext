<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Speed & Caption Control</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <span class="logo">▶▶</span>
      <h1>Speed &amp; Captions</h1>
    </header>

    <section class="row toggle-row">
      <label class="switch-label" for="enabled">Extension enabled</label>
      <label class="switch">
        <input type="checkbox" id="enabled" />
        <span class="slider"></span>
      </label>
    </section>

    <section class="card">
      <div class="speed-display">
        <span id="speedValue">1.5</span><span class="x">×</span>
      </div>

      <input
        type="range"
        id="speedRange"
        min="0.25"
        max="4"
        step="0.05"
        value="1.5"
      />

      <div class="presets" id="presets">
        <button class="preset" data-speed="0.5">0.5×</button>
        <button class="preset" data-speed="1">1×</button>
        <button class="preset" data-speed="1.25">1.25×</button>
        <button class="preset" data-speed="1.5">1.5×</button>
        <button class="preset" data-speed="1.75">1.75×</button>
        <button class="preset" data-speed="2">2×</button>
        <button class="preset" data-speed="2.5">2.5×</button>
        <button class="preset" data-speed="3">3×</button>
      </div>

      <div class="custom-row">
        <label for="speedNumber">Custom</label>
        <input
          type="number"
          id="speedNumber"
          min="0.0625"
          max="16"
          step="0.05"
          value="1.5"
        />
      </div>
    </section>

    <section class="row toggle-row">
      <label class="switch-label" for="disableCaptions">
        Always turn off captions
      </label>
      <label class="switch">
        <input type="checkbox" id="disableCaptions" />
        <span class="slider"></span>
      </label>
    </section>

    <p class="status" id="status">Saved automatically</p>

    <script src="popup.js"></script>
  </body>
</html>
